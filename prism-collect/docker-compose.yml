services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-prism}
    volumes:
      - prism_pgdata:/var/lib/postgresql/data
      - ./sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    profiles:
      - debug

  worker:
    build: .
    environment:
      GITHUB_PAT: ${GITHUB_PAT}
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-prism}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      PRISM_LOG_LEVEL: ${PRISM_LOG_LEVEL:-INFO}
      PRISM_RATE_LIMIT_BUFFER: ${PRISM_RATE_LIMIT_BUFFER:-300}
      PRISM_DEFAULT_PAGE_SIZE: ${PRISM_DEFAULT_PAGE_SIZE:-100}
    volumes:
      - ./config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - worker

volumes:
  prism_pgdata:
